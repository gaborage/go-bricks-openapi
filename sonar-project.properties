sonar.projectKey=gaborage_go-bricks-openapi
sonar.organization=gaborage

sonar.projectName=GoBricks OpenAPI
sonar.sources=cmd,internal
# **/testdata/** — fixture projects (the spectest analyze->generate fixtures) are
# inputs to tests, not production source. Their minimal go.mod files have no
# go.sum (they are parsed as AST, never built), which otherwise trips S8566.
sonar.exclusions=**/*_test.go,**/mocks/**,**/*.gen.go,**/testdata/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/mocks/**

# Coverage configuration (single merged profile produced by the CI test job)
sonar.go.coverage.reportPaths=coverage.out

# Coverage exclusions — lines that should NOT count toward the coverage %.
# - **/cmd/**/main.go — the CLI entrypoint is thin cobra.Execute() glue that
#   would require running the binary to cover; subcommand wiring is exercised by
#   the tool's own `go test` (cmd has 91%+ via main_test.go's run() seam).
sonar.coverage.exclusions=**/cmd/**/main.go

# Issue suppression — string-literal duplication in test data carries no shared
# semantic meaning; extracting it creates needless abstraction (YAGNI).
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
