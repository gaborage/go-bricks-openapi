# GoReleaser configuration for go-bricks-openapi.
# Validate locally with: goreleaser check
# Dry-run a release with:  goreleaser release --snapshot --clean
version: 2

project_name: go-bricks-openapi

before:
  hooks:
    - go mod tidy

builds:
  - id: go-bricks-openapi
    main: ./cmd/go-bricks-openapi
    binary: go-bricks-openapi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # main.version is the package-level var injected by ldflags (same seam the
      # Makefile uses). Use {{ .Tag }} (the full v-prefixed tag) so a prebuilt
      # binary reports the same string as a `go install ...@vX.Y.Z` build, whose
      # module version string keeps the leading v.
      - -s -w -X main.version={{ .Tag }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No demand for a Windows/arm64 build; everything else is supported.
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Release notes come from the CHANGELOG.md section (release-please-owned), passed
# to `goreleaser release --release-notes=...` by release.yml. Disable GoReleaser's
# own changelog so CHANGELOG.md stays the single source of truth for release notes.
changelog:
  disable: true

release:
  github:
    owner: gaborage
    name: go-bricks-openapi
  draft: false
  prerelease: auto
