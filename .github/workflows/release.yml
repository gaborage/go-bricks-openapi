name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # matches stable and pre-release tags; attestation runs on both

permissions:
  contents: write       # create the GitHub Release and upload assets
  id-token: write       # mint the OIDC token for keyless Sigstore signing
  attestations: write   # persist the build provenance attestation

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # GoReleaser needs full tag history for the changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        # Intentionally not continue-on-error: a signing failure should block the
        # release so a missing attestation is never silent.
        uses: actions/attest-build-provenance@v4
        with:
          # GoReleaser writes dist/checksums.txt (sha256 digests + names); one
          # attestation covers every archive and binary listed in it.
          subject-checksums: dist/checksums.txt
          # Storage records are org-only; this is a user-owned repo, so skip it
          # and keep the permission set to id-token + attestations.
          create-storage-record: false
