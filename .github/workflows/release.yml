name: Release

on:
  push:
    tags:
      - 'v*'   # signed tags cut by `make release`; release.yml re-verifies before publishing

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Independently re-verify the *tagged commit* — never trust that the local gate ran.
  verify:
    name: Verify tagged commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - run: go mod download

      - name: Build + validate CLI
        run: make validate-cli

      - name: Test
        run: make test

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vulnerability + security scan
        run: |
          make vuln
          make sec

  publish:
    name: Publish release
    needs: [verify]
    runs-on: ubuntu-latest
    # TRUST MODEL: GitHub runs this workflow from the *pushed tag's* tree, so the
    # in-job annotated/ancestor/signature checks below are defense-in-depth, not the
    # sole control — a tag could ship a modified release.yml. The enforcing control is
    # the REQUIRED `v*` tag-protection ruleset restricting tag creation to the
    # maintainer (RELEASING.md §0); the signed-tag gate then backs it up. Both matter.
    permissions:
      contents: write        # GoReleaser creates the GitHub Release and uploads assets
      pull-requests: write   # the autorelease:pending label step edits the merged Release PR
      id-token: write        # mint the OIDC token for keyless Sigstore signing
      attestations: write    # persist the build provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0  # GoReleaser needs full tag history
          persist-credentials: false

      - name: Re-fetch the real tag object (actions/checkout #882 can downgrade it)
        env:
          TAG: ${{ github.ref_name }}
        run: git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"

      - name: Assert tag is annotated and on main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          [ "$(git cat-file -t "$TAG")" = tag ] || { echo "::error::$TAG is not an annotated tag (use 'make release')"; exit 1; }
          # The tagged commit MUST be on main — defends against a tag that points at a
          # commit which adds an attacker key to .github/allowed_signers in the tag's own tree.
          git fetch --quiet origin main
          git merge-base --is-ancestor "$TAG^{commit}" origin/main \
            || { echo "::error::$TAG does not point at a commit on main"; exit 1; }

      - name: Verify SSH signature against the allowlist on main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Trust root = .github/allowed_signers AS ON MAIN (ruleset-protected), NOT the tag's own copy.
          git show origin/main:.github/allowed_signers > /tmp/allowed_signers
          if grep -qiE 'REPLACE|PASTE_REAL|<.*public.*key.*>' /tmp/allowed_signers; then
            echo "::error::.github/allowed_signers on main has a placeholder"; exit 1
          fi
          git config gpg.format ssh
          git -c gpg.ssh.allowedSignersFile=/tmp/allowed_signers tag -v "$TAG"

      - name: Assemble release notes from the CHANGELOG section
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          notes="$(mktemp)"
          awk -v v="$ver" '
            BEGIN { gsub(/[.]/, "\\.", v) }
            $0 ~ ("^## \\[v?" v "\\]") {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > "$notes"
          test -s "$notes" || { echo "::error::no CHANGELOG section for $TAG"; exit 1; }
          echo "file=$notes" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          version: '~> v2'
          # --release-notes makes the CHANGELOG.md section (release-please-owned) the
          # GitHub Release body; GoReleaser's own changelog is disabled in .goreleaser.yaml.
          args: release --clean --release-notes=${{ steps.notes.outputs.file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        # Intentionally not continue-on-error: a signing failure should block the
        # release so a missing attestation is never silent.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          # GoReleaser writes dist/checksums.txt (sha256 digests + names); one
          # attestation covers every archive and binary listed in it.
          subject-checksums: dist/checksums.txt
          # Storage records are org-only; this is a user-owned repo, so skip it
          # and keep the permission set to id-token + attestations.
          create-storage-record: false

      - name: Clear release-please autorelease:pending label (#1561)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Removing 'autorelease: pending' is the deadlock-breaker. A single combined
          # remove+add would fail atomically if the 'tagged' label doesn't exist
          # (release-please never creates it under skip-github-release), re-deadlocking #1561.
          prs="$(gh pr list --state merged --label 'autorelease: pending' --json number --jq '.[].number')"
          if [ -z "$prs" ]; then echo "No merged autorelease:pending PR found (ok)"; fi
          for pr in $prs; do
            gh pr edit "$pr" --remove-label 'autorelease: pending'
            gh pr edit "$pr" --add-label 'autorelease: tagged' 2>/dev/null \
              || echo "note: 'autorelease: tagged' label missing on PR #$pr (non-fatal)"
            echo "Cleared autorelease:pending on PR #$pr"
          done
