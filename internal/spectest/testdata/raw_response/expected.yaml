openapi: 3.0.1
info:
  title: Legacy API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /jobs:
    post:
      operationId: enqueueLegacyJob
      summary: POST /jobs
      tags:
        - jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnqueueReq'
      responses:
        "202":
          description: Request accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/JobAck'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /legacy/users/{id}:
    get:
      operationId: legacyGetLegacyUser
      summary: GET /legacy/users/{id}
      tags:
        - legacy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyUser'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawErrorResponse'
components:
  schemas:
    EnqueueReq:
      type: object
      properties:
        jobType:
          type: string
      required:
        - jobType
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    JobAck:
      type: object
      properties:
        jobId:
          type: string
    LegacyUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    RawErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
        - code
        - message
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
security:
  - TenantID: []
