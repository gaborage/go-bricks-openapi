openapi: 3.0.1
info:
  title: Legacy API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /jobs:
    post:
      operationId: enqueueLegacyJob
      summary: POST /jobs
      tags:
        - jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnqueueReq'
      responses:
        "202":
          description: Request accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/JobAck'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /legacy/users/{id}:
    get:
      operationId: legacyGetLegacyUser
      summary: GET /legacy/users/{id}
      tags:
        - legacy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyUser'
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawErrorResponse'
components:
  schemas:
    EnqueueReq:
      type: object
      properties:
        jobType:
          type: string
      required:
        - jobType
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. BAD_REQUEST, NOT_FOUND, INTERNAL_ERROR, or a custom business code)
            details:
              type: object
              properties:
                validationErrors:
                  type: array
                  description: Per-field validation failures (400 validation errors)
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                        description: Field that failed validation
                      message:
                        type: string
                        description: Violated validation rule
                      value:
                        description: Submitted value (any type)
                  maxItems: 100
              description: Contextual error payload, emitted in development environments only
            message:
              type: string
              description: Human-readable error message
          description: Error details
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
              description: RFC3339 response timestamp
            traceId:
              type: string
              description: W3C trace identifier for the request
      required:
        - error
    JobAck:
      type: object
      properties:
        jobId:
          type: string
    LegacyUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    RawErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
        - code
        - message
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier. Enforced only when the service runs with multitenancy enabled and a header-based tenant resolver; a missing or invalid tenant yields HTTP 400. Deployments resolving the tenant from the subdomain or URL path do not read this header.
security:
  - TenantID: []
