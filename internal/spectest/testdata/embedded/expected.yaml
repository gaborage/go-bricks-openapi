openapi: 3.0.1
info:
  title: Embed API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /accounts/{id}:
    get:
      operationId: embedGetAccount
      summary: GET /accounts/{id}
      tags:
        - embed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      operationId: embedGetUser
      summary: GET /users/{id}
      tags:
        - embed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /wrappers/{id}:
    get:
      operationId: embedGetWrapper
      summary: GET /wrappers/{id}
      tags:
        - embed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Wrapper'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Account:
      type: object
      properties:
        balance:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        id:
          type: integer
          format: int64
    Base:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        id:
          type: integer
          format: int64
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. BAD_REQUEST, NOT_FOUND, INTERNAL_ERROR, or a custom business code)
            details:
              type: object
              description: 'Contextual error payload, emitted in development environments only. Validation failures carry validationErrors: [{field, message, value}].'
            message:
              type: string
              description: Human-readable error message
          description: Error details
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
              description: RFC3339 response timestamp
            traceId:
              type: string
              description: W3C trace identifier for the request
      required:
        - error
    User:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        id:
          type: integer
          format: int64
        name:
          type: string
    Wrapper:
      type: object
      properties:
        base:
          $ref: '#/components/schemas/Base'
        label:
          type: string
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier. Enforced only when the service runs with multitenancy enabled and a header-based tenant resolver; a missing or invalid tenant yields HTTP 400. Deployments resolving the tenant from the subdomain or URL path do not read this header.
security:
  - TenantID: []
