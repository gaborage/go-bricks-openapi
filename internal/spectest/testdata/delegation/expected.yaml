openapi: 3.0.1
info:
  title: Delegation API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /payments:
    post:
      operationId: paymentsCreatePayment
      summary: POST /payments
      tags:
        - payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment'
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Payment'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payments/{id}:
    get:
      operationId: paymentsGetPayment
      summary: GET /payments/{id}
      tags:
        - payments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Payment'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/payments/pending:
    get:
      operationId: paymentsListPending
      summary: GET /v1/payments/pending
      tags:
        - admin
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Response data
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    Payment:
      type: object
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
        id:
          type: string
      required:
        - amount
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
security:
  - TenantID: []
