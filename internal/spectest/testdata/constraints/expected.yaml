openapi: 3.0.1
info:
  title: Constraintsdemo API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /items:
    post:
      operationId: shopCreate
      summary: POST /items
      tags:
        - items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReq'
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Ack'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Ack:
      type: object
      properties:
        id:
          type: integer
          format: int64
    CreateReq:
      type: object
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 10000
        name:
          type: string
          minLength: 3
          maxLength: 49
        region:
          type: string
          enum:
            - North East
            - South West
        server:
          type: string
          format: ipv4
        slug:
          type: string
          pattern: ^svc-
        tags:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 5
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
security:
  - TenantID: []
