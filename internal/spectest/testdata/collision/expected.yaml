openapi: 3.0.1
info:
  title: Coll API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /orders:
    post:
      operationId: apiCreateOrder
      summary: POST /orders
      tags:
        - orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    post:
      operationId: apiCreateUser
      summary: POST /users
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Request'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    OrdersRequest:
      type: object
      properties:
        quantity:
          type: integer
          format: int32
          minimum: 1
        sku:
          type: string
      required:
        - sku
    Request:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
security:
  - TenantID: []
