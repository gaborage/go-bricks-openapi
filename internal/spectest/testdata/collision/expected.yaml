openapi: 3.0.1
info:
  title: Coll API
  version: 1.0.0
  description: Generated API specification
servers:
  - url: /
    description: Relative to the deployment host
paths:
  /orders:
    post:
      operationId: apiCreateOrder
      summary: POST /orders
      tags:
        - orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    post:
      operationId: apiCreateUser
      summary: POST /users
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Request'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request — malformed request or failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. BAD_REQUEST, NOT_FOUND, INTERNAL_ERROR, or a custom business code)
            details:
              type: object
              properties:
                validationErrors:
                  type: array
                  description: Per-field validation failures (400 validation errors)
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                        description: Field that failed validation
                      message:
                        type: string
                        description: Violated validation rule
                      value:
                        description: Submitted value (any type)
              description: Contextual error payload, emitted in development environments only
            message:
              type: string
              description: Human-readable error message
          description: Error details
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
              description: RFC3339 response timestamp
            traceId:
              type: string
              description: W3C trace identifier for the request
      required:
        - error
    OrdersRequest:
      type: object
      properties:
        quantity:
          type: integer
          format: int32
          minimum: 1
        sku:
          type: string
      required:
        - sku
    Request:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
  securitySchemes:
    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier. Enforced only when the service runs with multitenancy enabled and a header-based tenant resolver; a missing or invalid tenant yields HTTP 400. Deployments resolving the tenant from the subdomain or URL path do not read this header.
security:
  - TenantID: []
